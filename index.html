<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="mainContent">

        <img id="bunnyImage" src="bunny1.jpg" alt="Cute Bunny">

        <h2 id="message"></h2>

        <p class="question">
            Are you still mad at me?
        </p>

        <div class="buttons">
            <button id="yesBtn">Yes ❤️</button>
            <button id="noBtn">No 🥺</button>
        </div>

    </div>

    <div id="loveScreen" class="hidden">

        <h1>YAY!! ❤️</h1>

        <p>
            I knew your heart was too sweet to stay mad forever.
            <br><br>
            I love you so much.
            <br>
            Thank you for forgiving me.
            <br><br>
            🐰❤️
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
